<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Offers</title>

<link rel="stylesheet" href="css/app.css">

<style>

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.filters{
    background:#fff;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

.row{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.row input,
.row select{
    flex:1;
}

.table-container{
    background:#fff;
    border-radius:8px;
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,
td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.action-btn{
    padding:5px 10px;
    margin-right:5px;
    cursor:pointer;
}

.status{
    padding:4px 8px;
    border-radius:4px;
}

.status-draft{
    background:#ffeeba;
}

.status-submitted{
    background:#cce5ff;
}

.status-sent{
    background:#d4edda;
}

</style>
<link
    rel="manifest"
    href="manifest.json">

<meta
    name="theme-color"
    content="#1f4e79">
</head>

<body>

<div class="header">

    <h1>Offers</h1>

    <div>
        <button id="btnNewOffer">
            New Offer
        </button>
        <button id="btnExport">
            Export Excel
        </button>
        <button id="btnLogout">
            Logout
        </button>

    </div>

    

    <button
        id="installButton"
        style="display:none;">

        Install App

    </button>

    <div id="networkStatus">

        Online

    </div>
</div>

<div class="filters">

    <div class="row">

        <input
            id="search"
            placeholder="Search">

        <select id="status">

            <option value="">
                All Statuses
            </option>

            <option value="Draft">
                Draft
            </option>

            <option value="Submitted">
                Submitted
            </option>

            <option value="Sent">
                Sent
            </option>

        </select>

    </div>

    <div class="row">

        <input
            type="date"
            id="dateFrom">

        <input
            type="date"
            id="dateTo">

        <button id="btnSearch">
            Search
        </button>

    </div>

</div>

<div class="table-container">

    <table>

        <thead>

            <tr>

                <th>No</th>
                <th>Date</th>
                <th>Company</th>
                <th>Responsible</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody id="offersTable">

        </tbody>

    </table>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/offers.js"></script>

</body>
</html>
