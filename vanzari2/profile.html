<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>
My Profile
</title>

<link rel="stylesheet"
href="css/app.css">

</head>

<body>

<h1>
My Profile
</h1>

<div>

<label>
Full Name
</label>

<input id="full_name">

</div>
<label>
Username
</label>

<input
id="username"
readonly>

</div>

<div>

<label>
Role
</label>

<input
id="role"
readonly>

</div>
<div>

<label>
Email
</label>

<input id="email">

</div>

<div>

<button id="btnSaveProfile">

Save

</button>

</div>

<hr>

<h2>
Change Password
</h2>

<input
type="password"
id="currentPassword"
placeholder="Current Password">

<input
type="password"
id="newPassword"
placeholder="New Password">

<button
id="btnChangePassword">

Change Password

</button>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
