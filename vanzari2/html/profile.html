<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Profile</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="menuContainer"></div>
<div class="page-shell">
  <div class="container">
    <div class="section">
      <h1>My Profile</h1>
      <div class="form-group"><label for="full_name">Full Name</label><input id="full_name"></div>
      <div class="form-group"><label for="username">Username</label><input id="username" readonly></div>
      <div class="form-group"><label for="role">Role</label><input id="role" readonly></div>
      <div class="form-group"><label for="email">Email</label><input id="email"></div>
      <div class="button-row"><button class="btn" id="btnSaveProfile">Save</button></div>
    </div>
    <div class="section">
      <h2>Change Password</h2>
      <div class="form-group"><label for="currentPassword">Current Password</label><input type="password" id="currentPassword" placeholder="Current Password"></div>
      <div class="form-group"><label for="newPassword">New Password</label><input type="password" id="newPassword" placeholder="New Password"></div>
      <div class="button-row"><button class="btn" id="btnChangePassword">Change Password</button></div>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
