<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audit Log</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="menuContainer"></div>
<div class="page-shell">
  <div class="container">
    <div class="header">
      <div><h1>Audit Log</h1></div>
      <div class="button-row">
        <button class="btn" id="btnSearch">Refresh</button>
      </div>
    </div>
    <div class="section">
      <div class="input-row">
        <div class="form-group"><label for="dateFrom">From</label><input type="date" id="dateFrom"></div>
        <div class="form-group"><label for="dateTo">To</label><input type="date" id="dateTo"></div>
        <div class="form-group"><label for="userFilter">User</label><input id="userFilter" placeholder="User"></div>
        <div class="form-group"><label for="actionFilter">Action</label><input id="actionFilter" placeholder="Action"></div>
      </div>
    </div>
    <div class="section table-container">
      <table>
        <thead><tr><th>Date</th><th>User</th><th>Action</th><th>Details</th></tr></thead>
        <tbody id="auditTable"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/audit.js"></script>
</body>
</html>
