<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>Offer</title>

<link rel="stylesheet"
href="css/app.css">

<style>

.card{
    background:white;
    padding:20px;
    border-radius:8px;
}

.form-row{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.form-row input,
.form-row select,
.form-row textarea{
    flex:1;
}

textarea{
    min-height:100px;
}

.actions{
    margin-top:20px;
}

</style>

<link
    rel="manifest"
    href="manifest.json">

<meta
    name="theme-color"
    content="#1f4e79">
    
</head>

<body>

<h1>
Offer
</h1>

<div class="card">

<input
type="hidden"
id="offerId">

<div class="form-row">

<input
id="firma"
placeholder="Company">

<input
id="data"
type="date">

</div>

<div class="form-row">

<input
id="responsabil"
placeholder="Responsible">

<input
id="departament"
placeholder="Department">

</div>

<div class="form-row">

<select id="valuta">

<option value="RON">
RON
</option>

<option value="EUR">
EUR
</option>

<option value="GBP">
GBP
</option>

</select>

<select id="stareoferta">

<option value="Draft">
Draft
</option>

<option value="Submitted">
Submitted
</option>

<option value="Sent">
Sent
</option>

</select>

</div>

<div class="form-row">

<input
id="contact_client"
placeholder="Contact Person">

<input
id="email_client"
placeholder="Email">

</div>

<div class="form-row">

<textarea
id="observatii"
placeholder="Observations">
</textarea>

</div>

<div class="actions">

<button id="btnSave">
Save
</button>

<button id="btnSaveClose">
Save & Close
</button>

<button id="btnCancel">
Cancel
</button>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/offer-edit.js"></script>

</body>
</html>
