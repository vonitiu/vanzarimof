<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>
Settings
</title>

<link rel="stylesheet"
href="css/app.css">

</head>

<body>

<h1>
System Settings
</h1>

<div>

<label>
SMTP Host
</label>

<input id="smtp_host">

</div>

<div>

<label>
SMTP Port
</label>

<input id="smtp_port">

</div>

<div>

<label>
SMTP User
</label>

<input id="smtp_user">

</div>

<div>

<label>
SMTP Password
</label>

<input
id="smtp_password"
type="password">

</div>

<div>

<label>
Default Recipient
</label>

<input
id="default_email_recipient">

</div>

<input id="smtp_from">

<input id="smtp_from_name">

<input id="pdf_company_name">

<textarea id="pdf_footer">
</textarea>
<div>

<button id="btnSave">

Save Settings

</button>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
