<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>
Audit Log
</title>

<link rel="stylesheet"
href="css/app.css">

</head>

<body>

<div class="container">

<h1>
Audit Log
</h1>

<div class="filters">

<input
type="date"
id="dateFrom">

<input
type="date"
id="dateTo">

<input
id="userFilter"
placeholder="User">

<input
id="actionFilter"
placeholder="Action">

<button id="btnSearch">
Search
</button>

</div>

<table>

<thead>

<tr>

<th>Date</th>
<th>User</th>
<th>Action</th>
<th>Details</th>

</tr>

</thead>

<tbody id="auditTable">

</tbody>

</table>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/audit.js"></script>

</body>
</html>
