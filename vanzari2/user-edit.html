<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>User</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="page-shell">
  <div class="container">
<div id="menuContainer"></div>
    <div class="section">
      <h1>User</h1>
      <input type="hidden" id="userId">
      <div class="form-group"><label for="username">Username</label><input id="username"></div>
      <div class="form-group"><label for="full_name">Full Name</label><input id="full_name"></div>
      <div class="form-group"><label for="email">Email</label><input id="email"></div>
      <div class="form-group"><label for="role">Role</label><select id="role"><option value="admin">Admin</option><option value="manager">Manager</option><option value="sales">Sales</option><option value="viewer">Viewer</option></select></div>
      <div id="passwordContainer" class="form-group"><label for="password">Password</label><input id="password" type="password"></div>
      <div class="form-group"><label class="inline"><input type="checkbox" id="active" checked> Active</label></div>
      <div class="button-row"><button class="btn" id="btnSave">Save</button><button class="btn" onclick="location.href='users.html'">Cancel</button></div>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/user-edit.js"></script>
</body>
</html>
