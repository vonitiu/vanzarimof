<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>User</title>

<link rel="stylesheet"
href="css/app.css">

</head>

<body>

<h1>
User
</h1>

<input
type="hidden"
id="userId">

<div>

<label>
Username
</label>

<input id="username">

</div>

<div>

<label>
Full Name
</label>

<input id="full_name">

</div>

<div>

<label>
Email
</label>

<input id="email">

</div>

<div>

<label>
Role
</label>

<select id="role">

<option value="admin">
Admin
</option>

<option value="manager">
Manager
</option>

<option value="sales">
Sales
</option>

<option value="viewer">
Viewer
</option>

</select>

</div>

<div id="passwordContainer">

<label>
Password
</label>

<input
id="password"
type="password">

</div>

<div>

<label>

<input
type="checkbox"
id="active"
checked>

Active

</label>

</div>

<div>

<button id="btnSave">

Save

</button>

<button
onclick="
location.href='users.html'
">

Cancel

</button>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/user-edit.js"></script>

</body>
</html>
